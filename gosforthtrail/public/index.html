<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gosforth Trail</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #EDE0D4;
      color: #000;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      margin: 0;
    }
    .card {
      border: 2px solid #000;
      border-radius: 24px;
      padding: 24px;
      text-align: center;
      max-width: 520px;
      width: 100%;
    }
    .logo {
      width: 180px;
      height: auto;
      margin-bottom: 16px;
    }
    h1 {
      margin: 0 0 12px 0;
      font-size: 26px;
    }
    p {
      margin: 0 0 12px 0;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="/gosforthtrail.png" alt="Gosforthrail" class="logo" />
    <h1>Gosforth Trail</h1>
    <p>This app is configured to load from a remote server when running in Capacitor.</p>
    <p>Set the CAP_SERVER_URL environment variable before running cap sync.</p>
  </div>
</body>
</html>
